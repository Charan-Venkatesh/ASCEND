services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ascend
      POSTGRES_PASSWORD: ascend_dev_password
      POSTGRES_DB: ascend_os
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ascend -d ascend_os"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.11.3
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env.example
    environment:
      DATABASE_URL: postgresql+psycopg://ascend:ascend_dev_password@postgres:5432/ascend_os
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      FRONTEND_ORIGIN: http://localhost:3000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started

  worker:
    build:
      context: ./backend
    command: ["celery", "-A", "app.infrastructure.queue.celery_app:celery_app", "worker", "-B", "--loglevel=INFO"]
    env_file:
      - ./backend/.env.example
    environment:
      DATABASE_URL: postgresql+psycopg://ascend:ascend_dev_password@postgres:5432/ascend_os
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
